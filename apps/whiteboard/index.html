<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whiteboard - Nexus Hub</title>
    <link rel="stylesheet" href="whiteboard.css">
</head>
<body>
    <!-- Top Toolbar -->
    <div class="toolbar glass-panel">
        <div class="toolbar-section">
            <a href="../../index.html" class="back-btn" title="Back to Home">
                <span>←</span>
            </a>
            <h1 class="app-title">Whiteboard</h1>
        </div>
        
        <div class="toolbar-section tools">
            <button class="tool-btn active" data-tool="pen" title="Pen (P)">
                <span>✏️</span>
            </button>
            <button class="tool-btn" data-tool="highlighter" title="Highlighter (H)">
                <span>🖍️</span>
            </button>
            <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
                <span>🧹</span>
            </button>
        </div>
        
        <div class="toolbar-section colors">
            <button class="color-btn active" data-color="#1d1d1f" style="background: #1d1d1f;"></button>
            <button class="color-btn" data-color="#007aff" style="background: #007aff;"></button>
            <button class="color-btn" data-color="#34c759" style="background: #34c759;"></button>
            <button class="color-btn" data-color="#ff9500" style="background: #ff9500;"></button>
            <button class="color-btn" data-color="#ff2d55" style="background: #ff2d55;"></button>
            <button class="color-btn" data-color="#af52de" style="background: #af52de;"></button>
            <input type="color" id="customColor" class="color-picker" title="Custom Color">
        </div>
        
        <div class="toolbar-section">
            <div class="stroke-size">
                <input type="range" id="strokeSize" min="1" max="50" value="3">
                <span id="strokeSizeValue">3</span>
            </div>
        </div>
        
        <div class="toolbar-section actions">
            <button class="action-btn" id="undoBtn" title="Undo (Ctrl+Z)">
                <span>↩️</span>
            </button>
            <button class="action-btn" id="redoBtn" title="Redo (Ctrl+Y)">
                <span>↪️</span>
            </button>
            <button class="action-btn" id="clearBtn" title="Clear Canvas">
                <span>🗑️</span>
            </button>
        </div>
        
        <div class="toolbar-section file-actions">
            <button class="action-btn primary" id="importPdfBtn" title="Import PDF">
                <span>📄</span> Import
            </button>
            <button class="action-btn primary" id="exportPng" title="Export as PNG">
                <span>💾</span> PNG
            </button>
            <button class="action-btn primary" id="exportPdf" title="Export as PDF">
                <span>📑</span> PDF
            </button>
        </div>
        
        <div class="toolbar-section">
            <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                <span>🌙</span>
            </button>
        </div>
    </div>
    
    <!-- Pages Sidebar -->
    <div class="pages-sidebar glass-panel">
        <div class="pages-header">
            <h3>Pages</h3>
            <button class="add-page-btn" id="addPageBtn" title="Add Page">+</button>
        </div>
        <div class="pages-list" id="pagesPanel">
            <!-- Page thumbnails will be added here -->
        </div>
    </div>
    
    <!-- Main Canvas Area -->
    <div class="canvas-container">
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="whiteboard"></canvas>
        </div>
    </div>
    
    <!-- Hidden file input for PDF import -->
    <input type="file" id="pdfInput" accept=".pdf,.png,.jpg,.jpeg" style="display: none;">
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p>Loading...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="whiteboard.js"></script>
</body>
</html>
